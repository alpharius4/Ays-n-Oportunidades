{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0 border-success border-top border-3">
                <div class="card-header bg-white py-3">
                    <h4 class="mb-0 fw-bold text-success">Publicar Nueva Oferta Laboral</h4>
                </div>
                <div class="card-body p-4">
                    
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        
                        <div class="d-flex justify-content-between mt-4">
                            <a href="{% url 'accounts:dashboard' %}" class="btn btn-outline-secondary fw-bold">Cancelar</a>
                            <button type="submit" class="btn btn-success fw-bold">Publicar Empleo</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
