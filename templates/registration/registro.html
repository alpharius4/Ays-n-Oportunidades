{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow border-0 border-warning border-top border-3">
            <div class="card-header bg-white text-center py-3">
                <h4 class="mb-0 fw-bold text-warning">Crear una Cuenta</h4>
            </div>
            <div class="card-body p-4">
                
                <form method="post">
                    {% csrf_token %}
                    
                    <!-- Django renderizará los campos (usuario, email, contraseña y ROL) mágicamente -->
                    {{ form.as_p }}

                    <button type="submit" class="btn btn-warning w-100 fw-bold mt-3">Completar Registro</button>
                </form>
                
            </div>
            <div class="card-footer text-center bg-light py-3">
                <small class="text-muted">¿Ya tienes cuenta? <a href="{% url 'login' %}" class="text-warning fw-bold">Inicia sesión</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
