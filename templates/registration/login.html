{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow border-0">
            <div class="card-header bg-success text-white text-center py-3">
                <h4 class="mb-0">Iniciar Sesión</h4>
            </div>
            <div class="card-body p-4">
                
                <!-- Formulario de Django -->
                <form method="post">
                    {% csrf_token %}
                    
                    <!-- Campo de Usuario -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombre de Usuario</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>

                    <!-- Campo de Contraseña -->
                    <div class="mb-4">
                        <label class="form-label fw-bold">Contraseña</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-success w-100 fw-bold">Ingresar a mi cuenta</button>
                </form>
                
            </div>
            <div class="card-footer text-center bg-light py-3">
                <small class="text-muted">¿No tienes cuenta? <a href="{% url 'accounts:registro' %}" class="text-success fw-bold">Regístrate aquí</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
